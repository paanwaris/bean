url: https://paanwaris.github.io/bean/

template:
  light-switch: true
  params:
     bootswatch: united
  bootstrap: 5
  bslib:
    bg: "#ffffff" # white background
    fg: "#212529" # black text
    primary: "#007bff" # primary elements: blue
    input-bg: "#ffffff"     # color search bar
    input-color: "#212529"  # color text search bar
    navbar-light-bg: "#007bff" #color for navbar when light
    navbar-dark-bg: "#00008B" #color for navbar when dark

# Navigation bar configuration with icons
navbar:
  left:
    - icon: fa-home
      href: index.html
      aria-label: Home
    - text: "Functions"
      href: reference/index.html
    - icon: fas fa-book
      text: "Articles"
      menu:
        - text: "Overview"
          href: articles/bean-overview.html
        - text: "1. Data Preparation"
          href: articles/data-preparation.html
        - text: "2. Environmental Thinning"
          href: articles/environmental-thinning.html
        - text: "3. Niche Modeling"
          href: articles/niche-modeling.html

components:
    home: ~

# Grouping functions in the Reference tab
reference:
  - title: Data Preparation
    desc: Functions for preparing and cleaning occurrence data.
    contents:
      - prepare_bean
  - title: Thinning Logic
    desc: Functions for addressing sampling bias by thinning in environmental space (E-space).
    contents:
      - find_env_resolution
      - thin_env_nd
      - thin_env_center
      - plot_bean
  - title: Modeling & Visualization
    desc: Functions for fundamental niche delineation and predicting suitability.
    contents:
      - fit_ellipsoid
      - predict.bean_ellipsoid
  - title: Datasets
    desc: Example data shipped with the package.
    contents:
      - occ_data_raw
      - origin_dat_prepared
      - thinned_stochastic
      - thinned_deterministic
      - origin_ellipse
