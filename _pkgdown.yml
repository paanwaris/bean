url: https://paanwaris.github.io/bean/

template:
  light-switch: true
  package: tidytemplate
  bootstrap: 5

# Navigation bar configuration with icons
navbar:
  left:
    - icon: fa-home
      href: index.html
      aria-label: Home
    - text: "Functions"
      href: reference/index.html
    - icon: fas fa-book
      text: "Articles"
      menu:
        - text: "1. Data Prep"
          href: articles/data-preparation.html
        - text: "2. Environmental Thinning"
          href: articles/environmental-thinning.html
        - text: "3. Niche Delineation & Mapping"
          href: articles/niche-modeling.html

components:
    home: ~

# Grouping functions in the Reference tab
reference:
  - title: Data Preparation
    desc: Functions for preparing and cleaning occurrence data.
    contents:
      - prepare_bean
  - title: Thinning Logic
    desc: Functions for addressing sampling bias by thinning in environmental space (E-space).
    contents:
      - find_env_resolution
      - thin_env_nd
      - thin_env_center
      - plot_bean
  - title: Modeling & Visualization
    desc: Functions for fundamental niche delineation and predicting suitability.
    contents:
      - fit_ellipsoid
      - predict.ellipsoid_bean
